# 包含 43 位哲学家 Agent，分为 4 个主要部门
# - 中华哲学部 (道家、儒家、法家)
# - 亚伯拉罕哲学部 (犹太、伊斯兰、基督教)
# - 欧洲哲学部 (古希腊、近代西方、欧陆、分析)
# - 科学哲学部 (物理学哲学、生物学哲学、心灵哲学)
# =============================================================================

